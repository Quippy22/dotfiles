# Minimalist Hyprland Config
# Inherit basic binds/etc from original if needed, but for now we'll make it standalone or link it.
source = ~/.config/hypr/hyprland.conf

# Overrides for minimalist theme
general {
    gaps_in = 1
    gaps_out = 2
    border_size = 1
    col.active_border = rgba(ffffffaa)
    col.inactive_border = rgba(333333aa)
}

decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}
