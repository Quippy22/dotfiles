# Minimalist hyprland.conf
# This file contains the SAME binds as original, but sources the minimalist theme.

source = /home/darius/.config/hypr/theme.conf

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = HYPRCURSOR_THEME Nordzy-hyprcursors
env = HYPRCURSOR_SIZE 24
env = XCURSOR_THEME Nordzy-cursors
env = XCURSOR_SIZE 24

# NVIDIA specific
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

################
### MONITORS ###
################
monitor = DP-1,3440x1440@144,0x0,1


###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = GTK_THEME=Arc-Dark thunar
$menu = wofi --show drun --layer=overlay


#################
### AUTOSTART ###
#################
exec-once = xrdb -merge ~/.Xresources
exec-once = hyprctl setcursor Nordzy-cursors 24
exec-once = hyprpaper
exec-once = waybar
exec-once = swaync
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = xdg-desktop-portal-hyprland &
exec-once = xdg-desktop-portal &

# Apps
exec-once = [workspace 3 silent] youtube-music
exec-once = sh -c "hyprctl dispatch workspace 3; discord & sleep 5; hyprctl dispatch workspace 1"
exec-once = hyprctl dispatch workspace 1

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, R, togglesplit,

# Focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, j, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Personal
bind = $mainMod, s, exec, hyprshot -m region -o ~/Images/screenshots -c
bind = $mainMod SHIFT, s, exec, hyprshot -m window ~/Images/screenshots -c
bind = $mainMod SHIFT, RETURN, exec, kitty --class utility
bind = $mainMod, T, exec, ~/dotfiles/scripts/rice_selector.sh

# Mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
