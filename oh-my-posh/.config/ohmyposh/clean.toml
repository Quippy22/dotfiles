console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 3
final_space = true

[palette]
green = "#0ee89f"
yellowishgreen = "#00ff3f"
blue = "#0065ff"
red = "#ff0026"
orange = "#d84a01"
light_blue = "#78a7b9"
purple = "#bb9af7"

[[blocks]]
    type = 'prompt'
    alignment = 'left'
    newline = true

    [[blocks.segments]]
        type = 'path'
        style = 'plain'
        background = 'transparent'
        foreground = 'p:green'
        template = '{{ .Path }}'
        
        [blocks.segments.properties]
            style = 'full'
        
    [[blocks.segments]]
        type = 'git'
        style = 'plain'
        foreground = 'p:purple'
        background = 'transparent'
        template = '  {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }}{{ if gt .Ahead 0 }} ↑{{ .Ahead }}{{ end }}{{ if gt .Behind 0 }} ↓{{ .Behind }}{{ end }}'

        [blocks.segments.properties]
            branch_icon = ''
            fetch_status = true
            commit_icon = '@'

    [[blocks.segments]]
    type = "env"
    style = "plain"
    foreground = "p:orange"
    background = "transparent"
    env = "CONDA_DEFAULT_ENV"
    template = " λ {{ .EnvValue }}"

        [[blocks.segments]]
        type = 'text'
        style = 'plain'
        foreground_templates = [
      "{{if gt .Code 0}}p:red{{end}}",
      "{{if eq .Code 0}}p:yellowishgreen{{end}}",
    ]
        background = 'transparent'
        template = " ❯"

[transient_prompt]
    background = 'transparent'
    template = " ❯"
    foreground_templates = [
      "{{if gt .Code 0}}p:red{{end}}",
      "{{if eq .Code 0}}p:yellowishgreen{{end}}",
    ]

